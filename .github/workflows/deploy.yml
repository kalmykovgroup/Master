name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run web:build
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy dist
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            dist/ ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/master/dist/

      - name: Deploy migrations
        run: |
          rsync -avz \
            -e "ssh -i ~/.ssh/deploy_key" \
            supabase/migrations/ ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/master/supabase/migrations/

      - name: Deploy Edge Functions
        run: |
          rsync -avz \
            -e "ssh -i ~/.ssh/deploy_key" \
            supabase/functions/ ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/master/supabase/functions/

      - name: Deploy docker-compose
        run: |
          ssh -i ~/.ssh/deploy_key \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "mkdir -p /opt/master/supabase/docker"
          rsync -avz \
            -e "ssh -i ~/.ssh/deploy_key" \
            supabase/docker/docker-compose.yml ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/master/supabase/docker/docker-compose.yml

      - name: Deploy scripts
        run: |
          rsync -avz \
            -e "ssh -i ~/.ssh/deploy_key" \
            deploy/ ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/master/deploy/

      - name: Deploy nginx config
        run: |
          rsync -avz \
            -e "ssh -i ~/.ssh/deploy_key" \
            deploy/nginx.conf ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/etc/nginx/sites-available/master

      - name: Run migrations
        run: |
          ssh -i ~/.ssh/deploy_key \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "bash /opt/master/deploy/migrate.sh"

      - name: Rebuild and restart Edge Functions
        run: |
          ssh -i ~/.ssh/deploy_key \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "cd /opt/master/supabase/docker && docker compose build functions && docker compose up -d functions && nginx -t && systemctl reload nginx"
