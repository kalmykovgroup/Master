name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run web:build
        env:
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ vars.SUPABASE_ANON_KEY }}

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        server: ${{ fromJson(vars.APP_SERVERS) }}
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ matrix.server }} >> ~/.ssh/known_hosts

      - name: Deploy files
        env:
          TARGET: ${{ vars.VPS_USER }}@${{ matrix.server }}
        run: |
          SSH="ssh -i ~/.ssh/deploy_key"
          RSYNC="rsync -avz -e '$SSH'"

          # Ensure directories exist
          $SSH $TARGET "mkdir -p /opt/master/supabase/docker /opt/master/supabase/functions /opt/master/supabase/migrations /opt/master/deploy /var/www/master/dist"

          # Deploy all files
          eval $RSYNC --delete dist/ $TARGET:/var/www/master/dist/
          eval $RSYNC supabase/migrations/ $TARGET:/opt/master/supabase/migrations/
          eval $RSYNC supabase/functions/ $TARGET:/opt/master/supabase/functions/
          eval $RSYNC supabase/docker/docker-compose.yml $TARGET:/opt/master/supabase/docker/docker-compose.yml
          eval $RSYNC deploy/ $TARGET:/opt/master/deploy/

      - name: Deploy nginx config
        env:
          TARGET: ${{ vars.VPS_USER }}@${{ matrix.server }}
          DOMAIN: ${{ vars.DOMAIN }}
        run: |
          sed "s/\\\$DOMAIN/$DOMAIN/g" deploy/nginx.conf > /tmp/nginx-master.conf
          rsync -avz -e "ssh -i ~/.ssh/deploy_key" /tmp/nginx-master.conf $TARGET:/etc/nginx/sites-available/master

      - name: Run migrations
        if: ${{ matrix.server == fromJson(vars.APP_SERVERS)[0] }}
        env:
          TARGET: ${{ vars.VPS_USER }}@${{ matrix.server }}
        run: |
          ssh -i ~/.ssh/deploy_key $TARGET "bash /opt/master/deploy/migrate.sh"

      - name: Rebuild and restart services
        env:
          TARGET: ${{ vars.VPS_USER }}@${{ matrix.server }}
        run: |
          ssh -i ~/.ssh/deploy_key $TARGET \
            "cd /opt/master/supabase/docker && \
             docker compose build functions && \
             docker compose up -d functions && \
             nginx -t && systemctl reload nginx"
