# --- Upstreams (add more backends when scaling) ---
upstream supabase_api {
    server 127.0.0.1:8000;
    # server 10.0.0.2:8000;  # future: second app VM
}

upstream edge_functions {
    server 127.0.0.1:8082;
    # server 10.0.0.2:8082;  # future: second app VM
}

server {
    listen 80;
    server_name $DOMAIN;

    # SSL is configured automatically by certbot

    gzip on;
    gzip_types text/html text/css application/javascript application/json;

    # SPA — static files via symlink (zero-downtime switch)
    location / {
        root /opt/master/current/dist;
        try_files $uri $uri/ /index.html;

        # Cache hashed assets forever, no-cache for index.html
        location ~* \.(js|css|png|jpg|jpeg|gif|svg|webp|woff2?)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
        location = /index.html {
            expires -1;
            add_header Cache-Control "no-cache";
        }
    }

    # Health check for deploy smoke tests
    location = /_health {
        root /opt/master/current/dist;
        try_files /index.html =503;
        access_log off;
    }

    # Supabase REST, Auth, Storage API
    location ~ ^/(rest|auth|storage)/v1/ {
        proxy_pass http://supabase_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Edge Functions (push notifications etc.)
    location /send-push {
        proxy_pass http://edge_functions;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Supabase Realtime — WebSocket
    location /realtime/v1/ {
        proxy_pass http://supabase_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
    }
}
